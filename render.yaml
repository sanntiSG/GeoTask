services:
  - type: web
    name: geotask-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Las siguientes variables DEBEN configurarse en el dashboard de Render:
      # MONGO_URI, JWT_SECRET, JWT_REFRESH_SECRET, JWT_EXPIRES_IN,
      # JWT_REFRESH_EXPIRES_IN, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
      # GOOGLE_CALLBACK_URL, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY,
      # VAPID_SUBJECT, FRONTEND_URL, ADMIN_EMAIL
